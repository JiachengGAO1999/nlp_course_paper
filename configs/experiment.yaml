experiment:
  name: "compression_architecture_multi_turn_reasoning_qa"
  run_id: "compression_architecture_qwen3_8b"
  language: "en"
  paper_language: "zh"
  data_source: "benchmark_qa_with_llm_generated_dialogue"
  random_seed: 42

data:
  formal_num_samples: 40
  smoke_num_samples: 4
  pilot_num_samples: 12
  history_turns:
    min: 6
    max: 8
  full_history_target_tokens:
    enabled: false
    min: null
    max: null
    note: "Observe natural dialogue token distribution first; set filtering range after candidate generation."
  required_evidence_per_sample:
    min: 2
    max: 4
  distractors_per_sample:
    min: 2
    max: 4
  distractor_types:
    - topical_distractor
    - stale_information
    - soft_preference
    - near_miss_constraint
  answer_format: "multiple_choice"
  option_count: 4

layer1:
  benchmark: "MuSiQue-Ans"
  source_repo: "bdsaglam/musique"
  source_file: "musique_ans_v1.0_dev.jsonl"
  excluded_source_ids:
    # Entity bridge mismatch in the original MuSiQue chain:
    # Atlanta, Georgia is followed by evidence about Atlanta, Michigan.
    - "4hop1__93661_59747_211319_557671"
    # Gold answer is a type label rather than a concrete answer option.
    - "2hop__32887_578772"
  candidate_pool_size: 60
  formal_pool_size: 80
  hop_allocation:
    2: 12
    3: 30
    4: 18
  formal_pool_hop_allocation:
    2: 16
    3: 40
    4: 24
  formal_hop_allocation:
    2: 8
    3: 20
    4: 12
  formal_profile_allocation:
    far_early: 10
    far_middle: 10
    cross_turn: 10
    late: 10
  split_hop_allocation:
    smoke:
      2: 1
      3: 2
      4: 1
    pilot:
      2: 2
      3: 6
      4: 4
    formal:
      2: 8
      3: 20
      4: 12
    spares:
      2: 1
      3: 2
      4: 1
  evidence_position_profiles:
    - far_early
    - far_middle
    - cross_turn
    - late
  split_profile_allocation:
    smoke:
      far_early: 1
      far_middle: 1
      cross_turn: 1
      late: 1
    pilot:
      far_early: 3
      far_middle: 3
      cross_turn: 3
      late: 3
    formal:
      far_early: 10
      far_middle: 10
      cross_turn: 10
      late: 10
    formal_pool:
      far_early: 20
      far_middle: 20
      cross_turn: 20
      late: 20
    spares:
      far_early: 1
      far_middle: 1
      cross_turn: 1
      late: 1

budgets:
  compressed_history_budget_tokens: 800
  compressed_history_budget_tolerance:
    min: 500
    max: 1000
  optional_budget_sweep_tokens:
    - 300
    - 600
    - 900
  thinking_token_budget: 512

conditions:
  main:
    - full_history
    - one_shot_summary
    - hybrid_summary_recent

compression:
  paradigm: "prompt_based_self_compression"
  prompt_template: "docs/experiment_design.md"
  hybrid_recent_turns: 1
  hybrid_budget:
    summary_max_tokens: 550
    recent_turn_max_tokens: 250
    recent_turn_overflow_threshold: 300

pilot_acceptance:
  min_parse_rate: 0.95
  compressed_history_token_range:
    min: 500
    max: 1000
  full_history_average_token_range:
    min: 1500
    max: 2500
  require_no_fact_state_leakage: true
  require_no_ambiguous_gold: true
  require_reasoning_content_logging: true

compression_quality:
  required_evidence_retention: true
  answerability_labeling: true
  constraint_preservation: true
  stale_state_handling: true
  hallucination_check: true
  insufficient_context_label: "insufficient_context_for_answer"

model:
  provider: "vllm_openai_compatible"
  base_url: "http://localhost:8004/v1"
  model: "qwen3-8b-budget"
  model_revision: null
  server_version: "vllm 0.19.1; torch 2.10.0+cu128; gpu7; port=8004; reasoning_parser=qwen3; max_model_len=8192; thinking_token_budget=512"
  temperature: 0.0
  top_p: 1.0
  max_tokens: 2048
  timeout_seconds: 1800
  extra_body:
    chat_template_kwargs:
      enable_thinking: true
    thinking_token_budget: 512

summarizer:
  provider: "vllm_openai_compatible"
  base_url: "http://localhost:8004/v1"
  model: "qwen3-8b-budget"
  thinking_enabled: false
  temperature: 0.0
  top_p: 1.0
  max_tokens: 1024
  timeout_seconds: 1800
  count_summarizer_usage_separately: true
  summary_output_counts_toward_compressed_history_budget: true

audit:
  pilot_manual_audit_artifacts: 36
  formal_manual_audit_ratio: 0.10

prompt:
  final_answer_marker: "Final Answer:"
  answer_template: |
    You will answer a multiple-choice question based on the provided dialogue context.

    Choose the best option. Provide the final answer in the exact format:
    Final Answer: <A/B/C/D>

    Then give a brief explanation mentioning the key evidence from the context.

paths:
  data_dir: "data"
  runs_dir: "runs"
  raw_musique_ans: "data/raw/musique_ans_v1.0_dev.jsonl"
  layer1_dir: "data/layer1"
  layer1_candidates: "data/layer1/splits/candidates.jsonl"
  layer1_spares: "data/layer1/splits/spares.jsonl"
  layer1_audit: "data/layer1/audits/musique_sampling_audit.json"
  layer1_preview: "data/layer1/previews/musique_sampling_preview.md"
  smoke_samples: "data/layer1/splits/smoke.jsonl"
  pilot_samples: "data/layer1/splits/pilot.jsonl"
  formal_samples: "data/layer1/splits/formal.jsonl"
  formal_pool_samples: "data/layer1/splits/formal_pool.jsonl"
  mc_dir: "data/layer1/mc"
  dialogue_dir: "data/layer1/dialogues"
  audit_dir: "data/layer1/audits"
  preview_dir: "data/layer1/previews"
